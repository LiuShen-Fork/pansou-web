name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag, for example v1.2.3"
        required: true
        type: string
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v5
        with:
          path: frontend

      - name: Checkout backend repository
        uses: actions/checkout@v5
        with:
          repository: fish2018/pansou
          path: backend

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache-dependency-path: backend/go.sum

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build
          ls -la dist/

      - name: Install backend dependencies
        working-directory: backend
        run: go mod download

      - name: Build backend for multiple architectures
        working-directory: backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -installsuffix cgo -o pansou-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -a -installsuffix cgo -o pansou-arm64 .
          chmod +x pansou-*

      - name: Prepare build context
        run: |
          mkdir -p build-context
          cp -r frontend/dist build-context/frontend-dist
          cp backend/pansou-amd64 build-context/
          cp backend/pansou-arm64 build-context/
          cp frontend/Dockerfile build-context/
          cp frontend/start.sh build-context/
          chmod +x build-context/start.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize Docker image metadata
        id: image
        shell: bash
        run: |
          image_name="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: build-context
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.image.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILDTIME=${{ github.run_id }}
            VERSION=${{ steps.image.outputs.tag }}
            REVISION=${{ github.sha }}
